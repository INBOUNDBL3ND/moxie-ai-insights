<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — MOXIE AI Insights</title>
  <link rel="stylesheet" href="/css/moxie.css">
  <style>
    .admin-header {
      border-top: 4px solid var(--blue);
      padding: 32px 0 16px;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .admin-header img { width: 80px; height: 80px; }
    .admin-header .admin-title { flex: 1; }
    .admin-header h1 { font-family: 'Barlow Condensed', sans-serif; font-size: 2rem; margin: 0; color: var(--text); }
    .admin-header p { margin: 4px 0 0; color: var(--text-muted); font-size: 0.9rem; }
    .admin-stats {
      display: flex; gap: 16px; margin: 24px 0; flex-wrap: wrap;
    }
    .admin-stat {
      background: var(--blue-light); border: 1px solid var(--blue-border);
      border-radius: 10px; padding: 14px 16px; text-align: center; flex: 1; min-width: 100px;
    }
    .admin-stat .stat-num { font-size: 1.8rem; font-weight: 800; color: var(--blue); font-family: 'Barlow Condensed', sans-serif; }
    .admin-stat .stat-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .search-bar {
      width: 100%; padding: 14px 18px; font-size: 1rem;
      border: 2px solid var(--border); border-radius: 10px;
      font-family: 'Barlow', sans-serif; transition: border-color 0.2s;
      margin-bottom: 24px; box-sizing: border-box;
    }
    .search-bar:focus { outline: none; border-color: var(--blue); }
    .search-bar::placeholder { color: #aaa; }
    .client-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      margin-bottom: 40px;
    }
    .client-tile {
      background: var(--white); border: 1px solid var(--border);
      border-radius: 12px; padding: 20px;
      cursor: pointer; transition: all 0.2s ease;
      text-decoration: none; color: var(--text);
      display: flex; flex-direction: column; gap: 6px;
    }
    .client-tile:hover {
      border-color: var(--blue); box-shadow: 0 4px 16px rgba(29, 128, 222, 0.12);
      transform: translateY(-2px);
    }
    .client-tile .tile-name {
      font-size: 1.1rem; font-weight: 700; color: var(--text);
      font-family: 'Barlow Condensed', sans-serif;
    }
    .client-tile .tile-number {
      font-size: 0.85rem; color: var(--text-muted);
      font-family: 'Barlow', sans-serif; letter-spacing: 0.5px;
    }
    .client-tile .tile-arrow {
      margin-top: 10px; display: inline-flex; align-items: center; gap: 6px;
      background: var(--orange); color: #fff; padding: 8px 14px; border-radius: 8px;
      font-size: 0.8rem; font-weight: 600; text-align: center; justify-content: center;
    }
    .no-results {
      text-align: center; padding: 40px; color: var(--text-muted); font-size: 1rem;
      display: none;
    }
    @media (max-width: 600px) {
      .client-grid { grid-template-columns: 1fr; }
      .admin-header h1 { font-size: 1.5rem; }
    }
  </style>
</head>

      <div class="admin-title">
        <h1>Admin Dashboard</h1>
        <p>Inbound Blend — All Clients</p>
      </div>
      <a href="/" style="font-size:0.85rem;color:var(--blue);text-decoration:none;font-weight:600;">← Back to Home</a>
    </div>

    <div class="admin-stats" id="admin-stats"></div>

    <input type="text" class="search-bar" id="search" placeholder="Search by client name or number..." autocomplete="off">

        var keys = Object.keys(clients).sort(function (a, b) {
          return clients[a].name.localeCompare(clients[b].name);
        });

        // Stats — load service data and build filters
        var statsEl = document.getElementById('admin-stats');
        var adBreakEl = document.getElementById('admin-ad-breakdown');
        // clientFlags and activeFilter declared at top scope
        var clientInvited = {};

        function getFlags(blocks) {
          var f = {};
          blocks.forEach(function(b) {
            var bl = b.toLowerCase();
            if (bl.indexOf('google') > -1) f.google = true;
            if (bl.indexOf('facebook') > -1 || bl.indexOf('meta') > -1) f.facebook = true;
            if (bl.indexOf('linkedin') > -1) f.linkedin = true;
            if (bl.indexOf('tiktok') > -1) f.tiktok = true;
            if (bl.indexOf('microsoft') > -1 || bl.indexOf('bing') > -1) f.microsoft = true;
            if (bl.indexOf('youtube') > -1) f.youtube = true;
            if (bl.indexOf('billboard') > -1) f.billboard = true;
            if (bl.indexOf('geofenc') > -1 || bl.indexOf('targeted') > -1) f.geofence = true;
            if (bl.indexOf('seo') > -1) f.seo = true;
            if (bl.indexOf('social media post') > -1) f.social = true;
            if (bl.indexOf('website') > -1 && bl.indexOf('remarketing') === -1) f.web = true;
            if (bl === 'hosting' || (blocks.length === 1 && bl.indexOf('hosting') > -1)) f.hosting = true;
            if (bl.indexOf('email') > -1 || bl.indexOf('newsletter') > -1) f.email = true;
          });
          return f;
        }

        function buildStat(count, label, filterKey) {
          return '<div class="admin-stat" data-filter="' + filterKey + '" onclick="toggleFilter(\'' + filterKey + '\',this)" style="cursor:pointer;">' +
            '<div class="stat-num">' + count + '</div><div class="stat-label">' + label + '</div></div>';
        }

        // applyFilter defined globally below

        fetch('/data/service_blocks.json')
          .then(function(r) { return r.json(); })

            var counts = {all:keys.length, hosting:0, social:0, seo:0, web:0, email:0,
                         google:0, facebook:0, linkedin:0, microsoft:0, tiktok:0, youtube:0, billboard:0, geofence:0};
            Object.keys(svc).forEach(function(num) {
              var f = getFlags(svc[num]);
              clientFlags[num] = f;
              if (f.hosting) counts.hosting++;
              if (f.social) counts.social++;
              if (f.seo) counts.seo++;
              if (f.web) counts.web++;
              if (f.email) counts.email++;
              if (f.google) counts.google++;
              if (f.facebook) counts.facebook++;
              if (f.linkedin) counts.linkedin++;
              if (f.microsoft) counts.microsoft++;
              if (f.tiktok) counts.tiktok++;
              if (f.youtube) counts.youtube++;
              if (f.billboard) counts.billboard++;
              if (f.geofence) counts.geofence++;
            });
            statsEl.innerHTML =
              buildStat(counts.all, 'Total Clients', 'all') +
              buildStat(counts.hosting, 'Hosting Only', 'hosting') +
              buildStat(counts.social, 'Social Media', 'social') +
              buildStat(counts.seo, 'SEO', 'seo') +
              buildStat(counts.web, 'Website Mgt.', 'web') +
              buildStat(counts.email, 'Email', 'email');
            adBreakEl.innerHTML =
              buildStat(counts.google, 'Google Ads', 'google') +
              buildStat(counts.facebook, 'Facebook Ads', 'facebook') +
              buildStat(counts.linkedin, 'LinkedIn Ads', 'linkedin') +
              buildStat(counts.microsoft, 'Microsoft Ads', 'microsoft') +
              buildStat(counts.tiktok, 'TikTok Ads', 'tiktok') +
              buildStat(counts.youtube, 'YouTube Ads', 'youtube') +
              buildStat(counts.billboard, 'Billboards', 'billboard') +
              buildStat(counts.geofence, 'GeoFencing', 'geofence');

    function applyFilter() {
      var noResults = document.getElementById('no-results');
      var visible = 0;
      tiles.forEach(function(tile) {
        var num = tile.getAttribute('data-num');
        var searchQ = document.getElementById('search').value.toLowerCase().trim();
        var matchSearch = !searchQ || tile.getAttribute('data-name').indexOf(searchQ) > -1 || num.indexOf(searchQ) > -1;
        var matchFilter = !activeFilter || (clientFlags[num] && clientFlags[num][activeFilter]);
        tile.style.display = (matchSearch && matchFilter) ? '' : 'none';
        if (matchSearch && matchFilter) visible++;
      });
      noResults.style.display = visible === 0 ? 'block' : 'none';
    }

    function toggleFilter(key, el) {
      // Toggle active filter
      if (activeFilter === key || key === 'all') {
        activeFilter = null;
      } else {
        activeFilter = key;
      }
      // Update active styling on all stat cards
      document.querySelectorAll('.admin-stat').forEach(function(s) {
        if (s.getAttribute('data-filter') === activeFilter) {
          s.style.background = '#1D80DE';
          s.style.borderColor = '#1D80DE';
          s.querySelector('.stat-num').style.color = '#fff';
          s.querySelector('.stat-label').style.color = 'rgba(255,255,255,0.8)';
        } else {
          s.style.background = '';
          s.style.borderColor = '';
          s.querySelector('.stat-num').style.color = '';
          s.querySelector('.stat-label').style.color = '';
        }
      });
      applyFilter();
    }

    function toggleInvite(num, checkbox) {
      var isChecked = checkbox.checked;
      var label = checkbox.parentElement;
      if (isChecked) {
        label.style.color = '#27AE60';
        label.innerHTML = '<input type="checkbox" checked onclick="event.stopPropagation();toggleInvite(\'' + num + '\',this)" style="cursor:pointer;accent-color:#27AE60;"> ✓ Invited';
      } else {
        label.style.color = 'var(--text-muted)';
        label.innerHTML = '<input type="checkbox" onclick="event.stopPropagation();toggleInvite(\'' + num + '\',this)" style="cursor:pointer;accent-color:#27AE60;"> Invited to Dashboard';
      }
      fetch('/.netlify/functions/invites', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ client: num, invited: isChecked })
      });
    }

    function dismissHealth(num, checkbox) {
      // Hide immediately
      var row = checkbox.closest('.health-row');
      if (row) row.style.display = 'none';
      // Save to server so it's cleared for everyone
      fetch('/.netlify/functions/health', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ client: num, clear: true })
      });
    }

  </script>

    /* Admin gate — PIN 080317 */
    (function () {
      var KEY = 'moxie_admin';
      var HASH = 'MDgwMzE3';
      if (localStorage.getItem(KEY) === HASH) return;
      var overlay = document.createElement('div');
      overlay.className = 'gate-overlay';
      overlay.innerHTML =
        '<div class="gate-box">' +
          '<img src="/assets/moxie-mascot-small.png" alt="MOXIE" style="width:100px;height:100px;margin:0 auto 12px;display:block;">' +

          '<input type="password" id="admin-gate-input" placeholder="Admin Code" maxlength="10" autocomplete="off">' +
          '<button id="admin-gate-btn" style="display:block;width:100%;margin-top:12px;padding:12px;background:#DF6229;color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;letter-spacing:0.5px;">Enter</button>' +
          '<div class="gate-error" id="admin-gate-error">Incorrect code. Please try again.</div>' +
        '</div>';
      document.body.appendChild(overlay);
      var input = document.getElementById('admin-gate-input');
      var btn = document.getElementById('admin-gate-btn');
      var error = document.getElementById('admin-gate-error');
      function tryAuth() {
        if (btoa(input.value) === HASH) {
          localStorage.setItem(KEY, HASH);
          overlay.remove();
        } else {
          error.style.display = 'block';
          input.value = '';
          input.focus();
        }
      }
      input.addEventListener('keydown', function (e) { if (e.key === 'Enter') tryAuth(); });
      btn.addEventListener('click', tryAuth);
      setTimeout(function () { input.focus(); }, 100);
    })();
